  <text x="732" y="588" text-anchor="middle" fill="#fb7185" font-size="7.5">NGFW</text>
  <rect x="756" y="576" width="34" height="16" rx="3" fill="#1a0008" stroke="#f43f5e" stroke-width="0.8"/>
  <text x="773" y="588" text-anchor="middle" fill="#fb7185" font-size="7.5">CASB</text>
  <rect x="796" y="576" width="30" height="16" rx="3" fill="#1a0008" stroke="#f43f5e" stroke-width="0.8"/>
  <text x="811" y="588" text-anchor="middle" fill="#fb7185" font-size="7.5">SWG</text>
  <rect x="832" y="576" width="30" height="16" rx="3" fill="#1a0008" stroke="#f43f5e" stroke-width="0.8"/>
