<svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <!-- HQ gradient -->
    <linearGradient id="hqGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2f5e"/>
      <stop offset="100%" stop-color="#0e1e3f"/>
    </linearGradient>
    <!-- Branch gradient -->
    <linearGradient id="branchGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a4a"/>
      <stop offset="100%" stop-color="#0e2535"/>
    </linearGradient>
    <!-- Prisma gradient -->
    <linearGradient id="prismaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1a4e"/>
      <stop offset="100%" stop-color="#1a0e35"/>
    </linearGradient>
    <!-- Bottom box gradient -->
    <linearGradient id="bottomGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2a3e"/>
      <stop offset="100%" stop-color="#0e1e2e"/>
    </linearGradient>
    <!-- Internet gradient -->
    <linearGradient id="internetGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a2a3a"/>
      <stop offset="100%" stop-color="#061a28"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glowBlue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPurple" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowCyan">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a9eff"/>
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4ff"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.15" stroke-opacity="0.08"/>
    </pattern>

    <!-- Animated dash -->
    <style>
      .dash-anim { stroke-dasharray: 8 4; animation: dash 2s linear infinite; }
      .dash-anim2 { stroke-dasharray: 8 4; animation: dash 2.5s linear infinite; }
      .dash-anim3 { stroke-dasharray: 8 4; animation: dash 1.8s linear infinite; }
      @keyframes dash { to { stroke-dashoffset: -48; } }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1000" height="720" fill="url(#bgGrad)"/>
  <rect width="1000" height="720" fill="url(#grid)"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" fill="#00d4ff" font-size="15" font-weight="bold" letter-spacing="4" filter="url(#glowCyan)">ENTERPRISE NETWORK ARCHITECTURE</text>
  <text x="500" y="54" text-anchor="middle" fill="#4a7a9b" font-size="10" letter-spacing="3">Fortinet SD-WAN + Prisma Access ZTNA Topology</text>
  <line x1="180" y1="60" x2="820" y2="60" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- ===== HQ DATACENTER ===== -->
  <rect x="330" y="74" width="340" height="90" rx="8" fill="url(#hqGrad)" stroke="#4a9eff" stroke-width="1.5" filter="url(#glowBlue)"/>
  <rect x="330" y="74" width="340" height="26" rx="8" fill="#1e3a6e" stroke="none"/>
  <rect x="330" y="88" width="340" height="12" rx="0" fill="#1e3a6e" stroke="none"/>
  <!-- Header text -->
  <text x="500" y="92" text-anchor="middle" fill="#00d4ff" font-size="11" font-weight="bold" letter-spacing="2">HQ DATACENTER</text>
  <!-- Icon: server rack -->
  <rect x="442" y="108" width="18" height="14" rx="2" fill="none" stroke="#4a9eff" stroke-width="1.2"/>
  <rect x="444" y="111" width="14" height="3" rx="1" fill="#4a9eff" opacity="0.5"/>
  <rect x="444" y="116" width="14" height="3" rx="1" fill="#4a9eff" opacity="0.5"/>
  <circle cx="457" cy="112.5" r="1" fill="#00ff88"/>
  <circle cx="457" cy="117.5" r="1" fill="#00ff88"/>
  <!-- NGFW badge -->
  <rect x="464" y="104" width="94" height="22" rx="4" fill="#0a2040" stroke="#4a9eff" stroke-width="0.8"/>
  <text x="511" y="119" text-anchor="middle" fill="#4a9eff" font-size="10" letter-spacing="1">Fortinet NGFW</text>
  <!-- Status indicator -->
  <circle cx="342" cy="86" r="4" fill="#00ff88" opacity="0.8"/>
  <text x="352" y="89" fill="#4a9eff" font-size="8" opacity="0.8">ACTIVE</text>

  <!-- ===== SD-WAN OVERLAY LABEL ===== -->
  <text x="500" y="188" text-anchor="middle" fill="#22d3ee" font-size="9" letter-spacing="2" opacity="0.8">Fortinet SD-WAN Overlay</text>

  <!-- Vertical line HQ → branch split -->
  <line x1="500" y1="164" x2="500" y2="202" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arrowBlue)" class="dash-anim"/>

  <!-- Horizontal line branch 1 to branch 2 -->
  <line x1="200" y1="202" x2="800" y2="202" stroke="#4a9eff" stroke-width="1.5"/>
  <!-- Vertical down to Branch 1 -->
  <line x1="200" y1="202" x2="200" y2="226" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <!-- Vertical down to Branch 2 -->
  <line x1="800" y1="202" x2="800" y2="226" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- ===== BRANCH 1 ===== -->
  <rect x="80" y="226" width="240" height="80" rx="8" fill="url(#branchGrad)" stroke="#22d3ee" stroke-width="1.5" filter="url(#glowCyan)"/>
  <rect x="80" y="226" width="240" height="24" rx="8" fill="#0e2535" stroke="none"/>
  <rect x="80" y="238" width="240" height="12" rx="0" fill="#0e2535" stroke="none"/>
  <text x="200" y="243" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="bold" letter-spacing="1">BRANCH 1</text>
  <!-- FW icon -->
  <rect x="118" y="258" width="20" height="16" rx="3" fill="none" stroke="#22d3ee" stroke-width="1.2"/>
  <line x1="118" y1="264" x2="138" y2="264" stroke="#22d3ee" stroke-width="0.8"/>
  <line x1="118" y1="269" x2="138" y2="269" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="145" y="270" fill="#22d3ee" font-size="9.5">FortiGate FW</text>
  <circle cx="92" cy="238" r="4" fill="#22d3ee" opacity="0.6"/>

  <!-- ===== BRANCH 2 ===== -->
  <rect x="680" y="226" width="240" height="80" rx="8" fill="url(#branchGrad)" stroke="#22d3ee" stroke-width="1.5" filter="url(#glowCyan)"/>
  <rect x="680" y="226" width="240" height="24" rx="8" fill="#0e2535" stroke="none"/>
  <rect x="680" y="238" width="240" height="12" rx="0" fill="#0e2535" stroke="none"/>
  <text x="800" y="243" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="bold" letter-spacing="1">BRANCH 2</text>
  <rect x="718" y="258" width="20" height="16" rx="3" fill="none" stroke="#22d3ee" stroke-width="1.2"/>
  <line x1="718" y1="264" x2="738" y2="264" stroke="#22d3ee" stroke-width="0.8"/>
  <line x1="718" y1="269" x2="738" y2="269" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="745" y="270" fill="#22d3ee" font-size="9.5">FortiGate FW</text>
  <circle cx="692" cy="238" r="4" fill="#22d3ee" opacity="0.6"/>

  <!-- ===== INTERNET CLOUD ===== -->
  <!-- Lines from Branch 1 and Branch 2 to Internet -->
  <line x1="200" y1="306" x2="200" y2="342" stroke="#4a9eff" stroke-width="1.3" class="dash-anim2"/>
  <line x1="800" y1="306" x2="800" y2="342" stroke="#4a9eff" stroke-width="1.3" class="dash-anim2"/>
  <line x1="200" y1="342" x2="800" y2="342" stroke="#4a9eff" stroke-width="1.3"/>

  <!-- Internet cloud shape -->
  <ellipse cx="500" cy="352" rx="130" ry="32" fill="url(#internetGrad)" stroke="#4a9eff" stroke-width="1.2" opacity="0.9"/>
