  <ellipse cx="400" cy="346" rx="38" ry="24" fill="url(#internetGrad)" stroke="#4a9eff" stroke-width="1"/>
  <ellipse cx="460" cy="338" rx="44" ry="28" fill="url(#internetGrad)" stroke="#4a9eff" stroke-width="1"/>
  <ellipse cx="540" cy="338" rx="44" ry="28" fill="url(#internetGrad)" stroke="#4a9eff" stroke-width="1"/>
  <ellipse cx="600" cy="346" rx="38" ry="24" fill="url(#internetGrad)" stroke="#4a9eff" stroke-width="1"/>
  <ellipse cx="500" cy="340" rx="130" ry="30" fill="url(#internetGrad)" stroke="none"/>
  <!-- Internet label -->
  <text x="500" y="348" text-anchor="middle" fill="#4a9eff" font-size="12" font-weight="bold" letter-spacing="3">INTERNET</text>
  <!-- Globe lines -->
  <ellipse cx="480" cy="354" rx="10" ry="6" fill="none" stroke="#4a9eff" stroke-width="0.7" opacity="0.5"/>
  <line x1="470" y1="354" x2="490" y2="354" stroke="#4a9eff" stroke-width="0.7" opacity="0.5"/>

  <!-- ===== PRISMA ACCESS CLOUD ===== -->
  <!-- Line Internet → Prisma -->
  <line x1="500" y1="370" x2="500" y2="404" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrowPurple)" class="dash-anim3"/>
  <text x="510" y="390" fill="#a855f7" font-size="8.5" letter-spacing="1" opacity="0.9">Prisma Access</text>

  <rect x="270" y="404" width="460" height="86" rx="10" fill="url(#prismaGrad)" stroke="#a855f7" stroke-width="1.8" filter="url(#glowPurple)"/>
  <rect x="270" y="404" width="460" height="26" rx="10" fill="#2a1060" stroke="none"/>
  <rect x="270" y="418" width="460" height="12" rx="0" fill="#2a1060" stroke="none"/>
  <text x="500" y="421" text-anchor="middle" fill="#c084fc" font-size="11" font-weight="bold" letter-spacing="2">PRISMA ACCESS CLOUD</text>
  <!-- Shield icon -->
  <path d="M 296 438 L 296 448 Q 296 455 302 458 L 308 461 L 314 458 Q 320 455 320 448 L 320 438 Z" fill="none" stroke="#a855f7" stroke-width="1.2"/>
  <path d="M 300 445 L 304 449 L 312 442" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Badges -->
  <rect x="330" y="432" width="110" height="20" rx="4" fill="#1a0a30" stroke="#a855f7" stroke-width="0.8"/>
  <text x="385" y="446" text-anchor="middle" fill="#c084fc" font-size="8.5">GlobalProtect VPN</text>
  <rect x="448" y="432" width="110" height="20" rx="4" fill="#1a0a30" stroke="#a855f7" stroke-width="0.8"/>
  <text x="503" y="446" text-anchor="middle" fill="#c084fc" font-size="8.5">ZTNA Policies</text>
  <rect x="566" y="432" width="100" height="20" rx="4" fill="#1a0a30" stroke="#a855f7" stroke-width="0.8"/>
  <text x="616" y="446" text-anchor="middle" fill="#c084fc" font-size="8.5">Identity Engine</text>
  <circle cx="282" cy="416" r="4" fill="#a855f7" opacity="0.7"/>

  <!-- ===== BOTTOM THREE BOXES ===== -->
  <!-- Branching lines from Prisma -->
  <line x1="500" y1="490" x2="500" y2="520" stroke="#a855f7" stroke-width="1.2"/>
  <line x1="175" y1="520" x2="825" y2="520" stroke="#a855f7" stroke-width="1.2"/>
  <line x1="175" y1="520" x2="175" y2="544" stroke="#a855f7" stroke-width="1.2" marker-end="url(#arrowPurple)"/>
  <line x1="500" y1="520" x2="500" y2="544" stroke="#a855f7" stroke-width="1.2" marker-end="url(#arrowPurple)"/>
  <line x1="825" y1="520" x2="825" y2="544" stroke="#a855f7" stroke-width="1.2" marker-end="url(#arrowPurple)"/>

  <!-- Remote Users -->
  <rect x="46" y="544" width="258" height="118" rx="8" fill="url(#bottomGrad)" stroke="#22d3ee" stroke-width="1.4"/>
  <rect x="46" y="544" width="258" height="24" rx="8" fill="#0a2030" stroke="none"/>
  <rect x="46" y="556" width="258" height="12" rx="0" fill="#0a2030" stroke="none"/>
  <text x="175" y="561" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="bold" letter-spacing="1.5">REMOTE USERS</text>
  <!-- Person icons -->
  <circle cx="90" cy="586" r="8" fill="none" stroke="#22d3ee" stroke-width="1.2"/>
  <path d="M 76 608 Q 76 596 90 596 Q 104 596 104 608" fill="none" stroke="#22d3ee" stroke-width="1.2"/>
  <circle cx="130" cy="586" r="8" fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.6"/>
  <path d="M 116 608 Q 116 596 130 596 Q 144 596 144 608" fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.6"/>
  <!-- Tags -->
  <rect x="155" y="578" width="55" height="16" rx="3" fill="#0a1a28" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="182.5" y="590" text-anchor="middle" fill="#22d3ee" font-size="8">ZTNA</text>
  <rect x="215" y="578" width="55" height="16" rx="3" fill="#0a1a28" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="242.5" y="590" text-anchor="middle" fill="#22d3ee" font-size="8">BYOD</text>
  <text x="175" y="622" text-anchor="middle" fill="#4a7a9b" font-size="8.5">Zero-Trust Network Access</text>
  <text x="175" y="636" text-anchor="middle" fill="#4a7a9b" font-size="8.5">Identity Verified · MFA Enforced</text>
  <text x="175" y="650" text-anchor="middle" fill="#4a7a9b" font-size="8.5">Device Posture Checked</text>

  <!-- SaaS Applications -->
  <rect x="372" y="544" width="258" height="118" rx="8" fill="url(#bottomGrad)" stroke="#f59e0b" stroke-width="1.4"/>
  <rect x="372" y="544" width="258" height="24" rx="8" fill="#2a1a06" stroke="none"/>
  <rect x="372" y="556" width="258" height="12" rx="0" fill="#2a1a06" stroke="none"/>
  <text x="501" y="561" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold" letter-spacing="1.5">SaaS APPLICATIONS</text>
  <!-- App icons -->
  <rect x="390" y="576" width="32" height="20" rx="3" fill="#1a0a00" stroke="#f59e0b" stroke-width="0.9"/>
  <text x="406" y="590" text-anchor="middle" fill="#fbbf24" font-size="7.5">O365</text>
  <rect x="430" y="576" width="50" height="20" rx="3" fill="#1a0a00" stroke="#f59e0b" stroke-width="0.9"/>
  <text x="455" y="590" text-anchor="middle" fill="#fbbf24" font-size="7.5">Salesforce</text>
  <rect x="488" y="576" width="32" height="20" rx="3" fill="#1a0a00" stroke="#f59e0b" stroke-width="0.9"/>
  <text x="504" y="590" text-anchor="middle" fill="#fbbf24" font-size="7.5">AWS</text>
  <rect x="528" y="576" width="38" height="20" rx="3" fill="#1a0a00" stroke="#f59e0b" stroke-width="0.9"/>
  <text x="547" y="590" text-anchor="middle" fill="#fbbf24" font-size="7.5">Azure</text>
  <rect x="574" y="576" width="42" height="20" rx="3" fill="#1a0a00" stroke="#f59e0b" stroke-width="0.9"/>
  <text x="595" y="590" text-anchor="middle" fill="#fbbf24" font-size="7.5">GCP</text>
  <text x="501" y="622" text-anchor="middle" fill="#6b4a10" font-size="8.5">Cloud-Native Applications</text>
  <text x="501" y="636" text-anchor="middle" fill="#6b4a10" font-size="8.5">Encrypted Traffic Inspection</text>
  <text x="501" y="650" text-anchor="middle" fill="#6b4a10" font-size="8.5">DLP · Access Control Policies</text>

